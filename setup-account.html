          <div class="col-lg-7 col-12 px-lg-0">
            <div class="login-sec-left-con">
              <div class="login-sec-left-wrap-m">
                <div class="login-sec-left-wrap">
                  <div class="login-sec-logo d-none d-lg-block">
                    <a href="#">
                      <img src="assets/images/mainlogo.png" class="img-fluid" alt="Image">
                    </a>
                  </div>
                  <div class="text-center d-block d-lg-none">
                    <img src="assets/images/logo.png" alt="">
                  </div>
                </div>
              </div>
            </div>
          </div>
          <div class="col-lg-5 col-12 px-lg-0">
            <div class="login-sec-right-con align-items-center">
              <div class="login-sec-right-wrap login-sec-right-wrap-h">
                <div class="login-sec-right-main setup-ac-main">
                  <div class="login-form-main login-cform-main">
                    <div class="login-logo text-center d-none d-lg-block">
                      <a href="#" class="login-sec-cu-btn">
                        <img src="assets/images/logo.png" alt="" class="whole-logo">
                      </a>
                    </div>
                    <div class="logo-form-wid text-lg-start text-center">
                      <h1 class="h1">Setup Account</h1>
                      <p class="mb-0">
                        Add details to personalize your workspace
                      </p>
                    </div>
                    <form class="login-form">
                      <div class="logo-form-la logo-form-wid">
                        <div class="logo-form-la logo-form-wid">
                          <div class="form-group">
                            <label for="form-f-name" class="form-label">Full name</label>
                            <input type="text" class="form-control border" id="form-f-name" name="form-f-name"
                              placeholder="Your name">
                          </div>
                        </div>

                        <div class="logo-form-la logo-form-wid">
                          <div class="form-group">
                            <label for="form-f-name" class="form-label">Profession / Occupation</label>
                            <input type="text" class="form-control border" id="form-f-name" name="form-f-name"
                              placeholder="e.g. Designer, Business owner">
                          </div>
                        </div>

                        <div class="logo-form-la logo-form-wid">
                          <div class="form-group">
                            <label class="form-label">How will you use Whole Planner?</label>

                            <div class="option-box">

                              <label class="option-item">
                                <input type="radio" name="use" value="business">
                                <div class="content">
                                  <h6 class="fw-bold">Small Business Owner</h6>
                                  <p class="fs-14 mb-0">Manage clients, tasks, and business operations.</p>
                                </div>
                                <div class="checkmark">
                                  <!-- <svg width="11" height="8" viewBox="0 0 11 8" fill="none" xmlns="http://www.w3.org/2000/svg">
                                      <path d="M9.8 1L4.13891 6.66109C3.92412 6.87588 3.57588 6.87588 3.36109 6.66109L1 4.3" stroke="white" stroke-width="2" stroke-linecap="round"/>
                                      </svg>                                       -->
                                </div>
                              </label>
                              <hr>
                              <label class="option-item">
                                <input type="radio" name="use" value="individual">
                                <div class="content">
                                  <h6 class="fw-bold">Individual / Solo Operator</h6>
                                  <p class="fs-14 mb-0">Organize personal tasks and daily activities.</p>
                                </div>
                                <div class="checkmark">
                                  <!-- <svg width="11" height="8" viewBox="0 0 11 8" fill="none" xmlns="http://www.w3.org/2000/svg">
                                      <path d="M9.8 1L4.13891 6.66109C3.92412 6.87588 3.57588 6.87588 3.36109 6.66109L1 4.3" stroke="white" stroke-width="2" stroke-linecap="round"/>
                                      </svg>                                                                        -->
                                </div>
                              </label>
                              <hr>
                              <label class="option-item">
                                <input type="radio" name="use" value="team">
                                <div class="content">
                                  <h6 class="fw-bold">Household Manager / Team</h6>
                                  <p class="fs-14 mb-0">Manage shared tasks for family or team.</p>
                                </div>
                                <div class="checkmark">
                                  <!-- <svg width="11" height="8" viewBox="0 0 11 8" fill="none" xmlns="http://www.w3.org/2000/svg">
                                      <path d="M9.8 1L4.13891 6.66109C3.92412 6.87588 3.57588 6.87588 3.36109 6.66109L1 4.3" stroke="white" stroke-width="2" stroke-linecap="round"/>
                                      </svg>                                                                          -->
                                </div>
                              </label>

                            </div>
