    <meta name="format-detection" content="address=no">
    <meta name="format-detection" content="email=no">

    <title>WholePlanner | Setup Startertag2</title>

    <!-- ================ /FONT Family =================== -->
    <link rel="icon" type="image/x-icon" href="assets/images/favicon.png">
    <link rel="stylesheet" type="text/css" href="assets/font/font-family/stylesheet.css">

<body>

    <!-- ====== /WRAPPER BOC ====== -->
    <div class="page-wrapper">

        <!-- ====== /CONTENT BOC ====== -->
        <section class="login-sec">
            <div class="container-fluid px-lg-0">
                <div class="row login-sec-row mx-lg-0">
                    <div class="col-lg-7 col-12 px-lg-0">
                        <div class="login-sec-left-con">
                            <div class="login-sec-left-wrap-m">
                                <div class="login-sec-left-wrap">
                                    <div class="login-sec-logo d-none d-lg-block">
                                        <a href="#">
                                            <img src="assets/images/mainlogo.png" class="img-fluid" alt="Image">
                                        </a>
                                    </div>
                                    <div class="text-center d-block d-lg-none">
                                        <img src="assets/images/logo.png" alt="">
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="col-lg-5 col-12 px-lg-0">
                        <div class="login-sec-right-con align-items-center starter-tag-wrap">
                            <div class="login-sec-right-wrap login-sec-right-wrap-h">
                                <div class="login-sec-right-main setup-startertag-main">
                                    <div class="login-form-main login-cform-main">
                                        <div class="login-logo text-center d-none d-lg-block">
                                            <a href="#" class="login-sec-cu-btn">
                                                <img src="assets/images/logo.png" alt="" class="whole-logo">
                                            </a>
                                        </div>
                                        <div class="logo-form-wid text-lg-start text-center">
                                            <h1 class="h1">Set up your starter tags</h1>
                                            <p class="mb-0 text_gray2">
                                                You are required to select at least 3 tags.
                                            </p>
                                        </div>
                                        <form class="login-form">
                                            <div class="logo-form-la logo-form-wid">
                                                <div class="logo-form-la logo-form-wid">
                                                    <div class="form-group">
                                                        <p class="set-form-title">We’ve suggested tags based on Small
                                                            Business Owner.</p>

                                                        <div class="option-checkbox">

                                                            <label class="tag-item">
                                                                <input type="checkbox" value="meetings">
                                                                <span>#Meetings</span>
                                                            </label>

                                                            <label class="tag-item">
                                                                <input type="checkbox" value="clients">
                                                                <span>#Clients</span>
                                                            </label>

                                                            <label class="tag-item">
                                                                <input type="checkbox" value="invoices">
                                                                <span>#Invoices</span>
                                                            </label>

                                                            <label class="tag-item">
                                                                <input type="checkbox" value="inventory">
                                                                <span>#Inventory</span>
                                                            </label>

                                                            <label class="tag-item">
                                                                <input type="checkbox" value="urgent">
                                                                <span>#Urgent</span>
                                                            </label>

                                                            <label class="tag-item">
                                                                <input type="checkbox" value="home">
                                                                <span>#Home</span>
                                                            </label>

                                                            <label class="tag-item">
                                                                <input type="checkbox" value="work">
                                                                <span>#Work</span>
                                                            </label>

                                                            <label class="tag-item">
                                                                <input type="checkbox" value="personal">
                                                                <span>#Personal</span>
                                                            </label>

                                                            <label class="tag-item">
                                                                <input type="checkbox" value="family">
                                                                <span>#Family</span>
                                                            </label>

                                                        </div>
                                                    </div>
                                                </div>
                                            </div>
                                            <div class="login-form-btn-wrap logo-form-wid fixed-btn-wrap">
                                                <a class="btn btn-secondary" href="setup-account.html">Back</a>
                                                <a class="btn btn-primary" href="dashboard.html">Continue</a>
                                            </div>
                                        </form>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
