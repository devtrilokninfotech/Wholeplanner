  <!-- =================== /WEB JS BOC ==================== -->

  <script>
    // Verification Code Input Handling
    document.addEventListener('DOMContentLoaded', function() {
        const inputs = document.querySelectorAll('.code-input');
        
        inputs.forEach((input, index) => {
            // Handle input
            input.addEventListener('input', function(e) {
                const value = e.target.value;
                
                // Only allow numbers
                if (!/^\d*$/.test(value)) {
                    e.target.value = '';
                    return;
                }
                
                // Move to next input if value entered
                if (value.length === 1 && index < inputs.length - 1) {
                    inputs[index + 1].focus();
                }
                
                // Check if all inputs are filled
                checkAllFilled();
            });
            
            // Handle backspace
            input.addEventListener('keydown', function(e) {
                if (e.key === 'Backspace' && !e.target.value && index > 0) {
                    inputs[index - 1].focus();
                }
            });
            
            // Handle paste
            input.addEventListener('paste', function(e) {
                e.preventDefault();
                const pastedData = e.clipboardData.getData('text').trim();
                
                // Only process if pasted data contains only numbers
                if (/^\d+$/.test(pastedData)) {
                    const digits = pastedData.split('').slice(0, 4);
                    digits.forEach((digit, i) => {
                        if (inputs[i]) {
                            inputs[i].value = digit;
                        }
                    });
                    
                    // Focus on the last filled input or next empty
                    const lastIndex = Math.min(digits.length - 1, inputs.length - 1);
                    inputs[lastIndex].focus();
                    checkAllFilled();
                }
            });
        });
        
        // Check if all inputs are filled
        function checkAllFilled() {
            const allFilled = Array.from(inputs).every(input => input.value.length === 1);
            const continueBtn = document.querySelector('.btn-continue');
            
            if (allFilled) {
                continueBtn.classList.add('active');
            } else {
                continueBtn.classList.remove('active');
            }
        }
        
        // Form submit
        document.querySelector('.login-form').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const code = Array.from(inputs).map(input => input.value).join('');
            
            if (code.length === 4) {
                console.log('Verification code:', code);
                // Add your verification logic here
                alert('Code submitted: ' + code);
            } else {
                alert('Please enter the complete 4-digit code');
            }
        });
    });
</script>
