            <div class="login-sec-left-con">
              <div class="login-sec-left-wrap-m">
                <div class="login-sec-left-wrap">
                  <div class="login-sec-logo d-none d-lg-block">
                    <a href="#">
                      <img src="assets/images/mainlogo.png" class="img-fluid" alt="Image">
                    </a>
                  </div>
                  <div class="text-center d-block d-lg-none">
                    <img src="assets/images/logo.png" alt="" class="whole-logo">
                  </div>
                </div>
              </div>
            </div>
          </div>
          <div class="col-lg-5 col-12 px-lg-0">
            <div class="login-sec-right-con align-items-center">
              <div class="login-sec-right-wrap login-sec-right-wrap-h">
                <div class="login-sec-right-main">
                  <div class="login-form-main login-cform-main">
                    <div class="login-logo text-center d-none d-lg-block">
                      <a href="#" class="login-sec-cu-btn">
                        <img src="assets/images/logo.png" alt="" class="whole-logo">
                      </a>
                    </div>
                    <div class="logo-form-wid text-lg-start text-center">
                      <h1 class="h1">Sign In</h1>
                      <p class="mb-0">
                        Access your planner and continue where you left off.
                      </p>
                   </div>
                    <form class="login-form">
                      <div class="logo-form-la logo-form-wid">
                        <div class="form-group">
                          <label for="form-email" class="form-label">Email Address</label>
                          <input type="email" class="form-control border" id="form-email" name="form-email"
                            placeholder="you@example.com">
                        </div>
                          <div class="form-group mb-2">
                            <label for="pwd" class="form-label">Your password</label>
                            <div class="password-icon">
                              <input type="password" class="form-control border" id="pwd" name="form-pass"
                                placeholder="Enter your password">
                              <i class="fa fa-regular fa-eye-slash toggle-password" toggle="#pwd"></i>
                            </div>
                          </div>
                          <div class="text-end">
                            <a href="forgot-password.html" class="login-form-forpass-link fw-bold">
                              Forgot password?
                            </a>
                          </div>
                      </div>
                      <div class="login-form-btn-wrap logo-form-wid">
                        <div class="btn-full mb-3">
                          <a class="btn btn-primary" href="dashboard-v1.html">Sign in</a>
                        </div>
                        <p class="text-center fs-14 graytext fw-300">Don’t have an account? <a href="sign-up.html"><span class="text-primary fw-bold">Sign Up</span></a></p>
                        
                        <div class="login-btn-else-sec text-center mx-auto">
                          <div class="login-btn-else align-items-center mb-3">
                            <div class="rightleft-line"><span>or</span></div>
                          </div>
  
                          <div class="login-btn-main">
                            <div class="login-btn-row d-flex align-items-center">
                              <div class="login-btn-col g-logo p-1 mb-2 btn-100">

                                </a>
                              </div>
                              <div class="login-btn-col apple-logo mb-2 p-1 btn-100">
                                <a href="#" class="login-btn-link d-flex align-items-center justify-content-center btn btn-black">
                                  <svg class="login-btn-icon me-2" width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M13.8169 10.534C13.8081 8.90076 14.537 7.668 16.0122 6.76012C15.1868 5.56297 13.9399 4.90432 12.2934 4.77526C10.7348 4.65065 9.03127 5.69648 8.40782 5.69648C7.74925 5.69648 6.23891 4.81976 5.05347 4.81976C2.60357 4.85981 0 6.80018 0 10.7477C0 11.9137 0.210744 13.1182 0.632233 14.3614C1.19422 15.9947 3.22263 20 5.33886 19.9332C6.44527 19.9065 7.22678 19.1366 8.66686 19.1366C10.063 19.1366 10.7875 19.9332 12.0212 19.9332C14.155 19.9021 15.9902 16.2617 16.5259 14.6239C13.6633 13.2577 13.8169 10.6186 13.8169 10.534ZM11.3319 3.22652C12.5305 1.7846 12.4207 0.47174 12.3856 0C11.3275 0.0623053 10.1026 0.729862 9.40447 1.55318C8.63613 2.43436 8.18391 3.5247 8.2805 4.753C9.42642 4.84201 10.4714 4.24566 11.3319 3.22652Z" fill="black"/></svg>

                              </div>
                            </div>
                          </div>
  
  
  
                        </div>
                      </div>
                      
                    </form>
                  </div>
                </div>
