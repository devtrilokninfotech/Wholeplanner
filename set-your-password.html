<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
  <meta name="format-detection" content="telephone=no">
  <meta name="format-detection" content="date=no">
  <meta name="format-detection" content="address=no">
  <meta name="format-detection" content="email=no">

  <title>WholePlanner | Set-your-password</title>

  <!-- ================ /FONT Family =================== -->
  <link rel="icon" type="image/x-icon" href="assets/images/favicon.png">
  <link rel="stylesheet" type="text/css" href="assets/font/font-family/stylesheet.css">
  <link rel="stylesheet" type="text/css" href="assets/font/font-awesome/css/font-awesome.min.css">
  <!-- ================ /FONT Family =================== -->

  <!-- =================== /WEB CSS BOC ==================== -->

  <link rel="stylesheet" type="text/css" href="assets/css/bootstrap.min.css">
  <link rel="stylesheet" type="text/css" href="assets/css/style.css">
  <link rel="stylesheet" type="text/css" href="assets/css/media.css">

  <!-- =================== /WEB CSS EOC ==================== -->


</head>

<body>

  <!-- ====== /WRAPPER BOC ====== -->
  <div class="page-wrapper">

    <!-- ====== /CONTENT BOC ====== -->
    <section class="login-sec">
      <div class="container-fluid px-lg-0">
        <div class="row login-sec-row mx-lg-0">
          <div class="col-lg-7 col-12 px-lg-0">
            <div class="login-sec-left-con">
              <div class="login-sec-left-wrap-m">
                <div class="login-sec-left-wrap">
                  <div class="login-sec-logo d-none d-lg-block">
                    <a href="#">
                      <img src="assets/images/mainlogo.png" class="img-fluid" alt="Image">
                    </a>
                  </div>
                  <div class="text-center d-block d-lg-none">
                    <img src="assets/images/logo.png" alt="">
                  </div>
                </div>
              </div>
            </div>
          </div>
          <div class="col-lg-5 col-12 px-lg-0">
            <div class="login-sec-right-con align-items-center">
              <div class="login-sec-right-wrap login-sec-right-wrap-h">
                <div class="login-sec-right-main">
                  <div class="login-form-main login-cform-main">
                    <div class="login-logo text-center d-none d-lg-block">
                      <a href="#" class="login-sec-cu-btn">
                        <img src="assets/images/logo.png" alt="" class="whole-logo">
                      </a>
                    </div>
                    <div class="logo-form-wid">
                      <h1 class="h1">Secure your account</h1>
                      <p class="mb-0">
                        Create a password you’ll use to sign in.
                      </p>
                   </div>
                    <form class="login-form">
                      <div class="logo-form-la logo-form-wid">
                          <div class="form-group">
                            <label for="form-pass" class="form-label">Password</label>
                            <div class="password-icon">
                                <input type="password" class="form-control border" id="pwd" name="form-pass"
                                  placeholder="Create a password">
                                <i class="fa fa-regular fa-eye-slash toggle-password" toggle="#pwd"></i>
                              </div>
                          </div>
                          <div class="form-group">
                            <label for="con-pwd" class="form-label">Confirm Password</label>
                            <div class="password-icon">
                              <input type="password" class="form-control border" id="con-pwd" name="form-pass"
                                placeholder="Re-enter your password">
                              <i class="fa fa-regular fa-eye-slash toggle-password" toggle="#con-pwd"></i>
                            </div>
                          </div>
                      </div>
                      <div class="login-form-btn-wrap logo-form-wid">
                        <div class="btn-full mb-3">
                          <a class="btn btn-primary" href="sign-in.html">Create Account</a>
                        </div>
                        <p class="text-center fs-14 graytext">Don’t have an account? <a href="sign-in.html"><span class="text-primary fw-bold">Sign In</span></a></p>
                      </div>
                      
                    </form>
                  </div>
                </div>               
              </div>
            </div>
          </div>
        </div>
      </div>
    </section>
    <!-- ====== /CONTENT EOC ====== -->


  </div>
  <!-- ====== /WRAPPER EOC ====== -->

  <!-- =================== /WEB JS BOC ==================== -->
  <script src="assets/js/jquery.min.js" type="text/javascript"></script>
  <script src="assets/js/bootstrap.bundle.min.js" type="text/javascript"></script>
  <script src="assets/js/custom.js" type="text/javascript"></script>

  <!-- =================== /WEB JS BOC ==================== -->


</body>

</html>
